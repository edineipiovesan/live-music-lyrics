<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Lyrics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dim1: rgba(255,255,255,0.55);
      --dim2: rgba(255,255,255,0.25);
      --dim3: rgba(255,255,255,0.10);
      --transition: 0.45s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      overflow: hidden;
    }

    /* ── Blurred background from album art ── */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(80px) saturate(1.4);
      opacity: 0;
      transform: scale(1.1);
      transition: opacity 1.2s ease;
      z-index: 0;
    }
    #bg.visible { opacity: 0.18; }

    #bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%);
      z-index: 1;
    }

    /* ── Status screen ── */
    #status {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #0d0d0d;
      transition: opacity 0.6s ease;
    }
    #status.hidden { opacity: 0; pointer-events: none; }

    .pulse-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      animation: pulse 2s ease-out infinite;
    }
    .pulse-ring::after {
      content: '';
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1);    opacity: 0.5; }
      50%       { transform: scale(1.3); opacity: 1; }
    }
    #status p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
    }

    /* ── App layout ── */
    #app {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #app.visible { opacity: 1; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      min-width: 180px;
      max-width: 520px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Scrollable top: album art + song info */
    #sidebar-top {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 24px 16px;
      scrollbar-width: none;
    }
    #sidebar-top::-webkit-scrollbar { display: none; }

    /* Fixed bottom: recently played + about the album */
    #sidebar-bottom {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 0 24px 24px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* Album art: scales with sidebar width */
    #album-art-wrap {
      width: 100%;
      max-width: 220px;
      margin: 0 auto 24px;
      flex-shrink: 0;
    }
    #album-art {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      object-fit: cover;
      display: block;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      transition: opacity 0.6s ease, transform 0.6s ease;
      background: #1a1a1a;
    }
    #album-art.loading { opacity: 0; transform: scale(0.96); }

    /* Song / artist / album text — wraps gracefully */
    #song-title {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.3;
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
      overflow-wrap: break-word;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #artist-name {
      font-size: 0.92rem;
      color: var(--dim1);
      text-align: center;
      margin-bottom: 4px;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    #album-line {
      font-size: 0.78rem;
      color: var(--dim2);
      text-align: center;
      margin-bottom: 16px;
      overflow-wrap: break-word;
      word-break: break-word;
      line-height: 1.4;
    }

    /* ── Facts section ── */
    #facts-section {
      display: none;
      margin-bottom: 20px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      /* Reserve height so the card doesn't jump when text changes */
      min-height: 72px;
    }

    #facts-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 6px;
    }

    #fact-text {
      font-size: 0.79rem;
      color: var(--dim1);
      line-height: 1.55;
      will-change: transform, opacity, filter;
    }

    @keyframes fact-exit {
      from { opacity: 1; transform: translateY(0);    filter: blur(0px); }
      to   { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
    }

    @keyframes fact-enter {
      from { opacity: 0; transform: translateY(10px);  filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0);     filter: blur(0px); }
    }

    #fact-text.fact-exiting {
      animation: fact-exit 0.35s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    #fact-text.fact-entering {
      animation: fact-enter 0.5s cubic-bezier(0, 0, 0.2, 1) forwards;
    }

    /* ── Album info section ── */
    #album-section {
      padding-top: 16px;
      flex-shrink: 0;
    }

    #album-section h2 {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 12px;
    }

    /* auto-fit: 2 columns at normal width, 1 column when sidebar is narrow */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 7px;
    }

    .info-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 0; /* prevent grid blowout */
    }
    .info-card .label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .info-card .value {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--dim1);
      overflow-wrap: break-word;
      word-break: break-word;
      line-height: 1.3;
    }

    /* ── History section ── */
    #history-section {
      padding-top: 16px;
      padding-bottom: 12px;
      flex-shrink: 0;
      display: none;
    }
    #history-section.visible { display: block; }

    #history-list {
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #history-list::-webkit-scrollbar { display: none; }

    #history-section h2 {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim2);
      margin-bottom: 12px;
    }

    .history-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .history-entry:last-child { border-bottom: none; }

    .history-thumb {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1e1e1e;
    }

    .history-thumb-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-thumb-placeholder svg { opacity: 0.2; }

    .history-meta {
      min-width: 0;
      flex: 1;
    }
    .history-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--dim1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-sub {
      font-size: 0.72rem;
      color: var(--dim2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .history-time {
      font-size: 0.68rem;
      color: var(--dim2);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── Resize handle ── */
    #resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: rgba(255,255,255,0.07);
      transition: background 0.15s;
      position: relative;
      z-index: 10;
      /* Widen hit area without expanding layout */
      margin: 0 -4px;
      padding: 0 4px;
    }
    #resize-handle::after {
      content: '';
      display: block;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.07);
      margin: 0 auto;
      transition: background 0.15s;
    }
    #resize-handle:hover::after,
    #resize-handle.dragging::after {
      background: rgba(255,255,255,0.35);
    }

    /* ── Lyrics panel ── */
    #lyrics-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* Top + bottom fade masks */
    #lyrics-panel::before,
    #lyrics-panel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }
    #lyrics-panel::before {
      top: 0;
      background: linear-gradient(to bottom, #0d0d0d 0%, transparent 100%);
    }
    #lyrics-panel::after {
      bottom: 0;
      background: linear-gradient(to top, #0d0d0d 0%, transparent 100%);
    }

    #lyrics-scroll {
      flex: 1;
      overflow-y: scroll;
      scrollbar-width: none;
      padding: 45vh 48px;
    }
    #lyrics-scroll::-webkit-scrollbar { display: none; }

    #lyrics-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .lyric-line {
      font-size: var(--lyric-size, 1.6rem);
      font-weight: 700;
      line-height: 1.35;
      padding: 6px 0;
      color: var(--dim3);
      cursor: default;
      transition:
        color var(--transition),
        font-size var(--transition),
        opacity var(--transition);
      will-change: color, font-size;
    }
    .lyric-line:empty::before { content: '·'; }
    .lyric-line:not(:empty) { cursor: pointer; }
    .lyric-line:not(:empty):hover { color: rgba(255,255,255,0.45) !important; }

    .lyric-line.near-2 { color: var(--dim2); }
    .lyric-line.near-1 { color: var(--dim1); font-size: calc(var(--lyric-size) * 1.03); }
    .lyric-line.active { color: #fff; font-size: calc(var(--lyric-size) * 1.25); }

    /* Flash on click-to-seek */
    @keyframes seek-flash {
      0%   { opacity: 1; }
      30%  { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .lyric-line.seeking { animation: seek-flash 0.35s ease; }

    /* ── Floating controls ── */
    #controls {
      position: absolute;
      top: 20px;
      right: 24px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
    }
    .ctrl-btn:active { transform: scale(0.96); }

    .ctrl-btn svg {
      flex-shrink: 0;
      opacity: 0.75;
    }

    /* Spin animation for the recognize button */
    @keyframes spin-cw {
      to { transform: rotate(360deg); }
    }
    #btn-recognize.loading svg {
      animation: spin-cw 0.8s linear infinite;
    }
    #btn-recognize.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* ── Rate-limit banner ── */
    #rate-limit-banner {
      display: none;
      position: absolute;
      top: 60px;
      right: 24px;
      z-index: 10;
      padding: 6px 13px;
      border: 1px solid rgba(255,180,0,0.3);
      border-radius: 20px;
      background: rgba(80,50,0,0.7);
      backdrop-filter: blur(12px);
      color: rgba(255,200,80,0.9);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    #rate-limit-banner.visible { display: block; }

    /* ── Search / override modal ── */
    #search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
    }
    #search-overlay.visible { display: flex; }

    #search-modal {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px 32px;
      width: 360px;
      max-width: 90vw;
    }
    #search-modal h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
    }
    .search-field { margin-bottom: 14px; }
    .search-field label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
    }
    .search-field input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-field input:focus { border-color: rgba(255,255,255,0.35); }
    #search-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .search-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-search-cancel { background: transparent; color: rgba(255,255,255,0.5); }
    #btn-search-cancel:hover { background: rgba(255,255,255,0.07); }
    #btn-search-submit { background: rgba(255,255,255,0.12); color: #fff; }
    #btn-search-submit:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="bg-overlay"></div>

  <!-- Waiting screen -->
  <div id="status">
    <div class="pulse-ring"></div>
    <p>Listening for music…</p>
  </div>

  <!-- Main app -->
  <div id="app">
    <!-- Left: album art + info -->
    <aside id="sidebar">

      <!-- Scrollable top -->
      <div id="sidebar-top">
        <div id="album-art-wrap">
          <img id="album-art" class="loading" alt="Album art" />
        </div>
        <div id="song-title">—</div>
        <div id="artist-name">—</div>
        <div id="album-line"></div>

        <div id="facts-section">
          <div id="facts-label">Did you know</div>
          <p id="fact-text"></p>
        </div>
      </div>

      <!-- Fixed bottom -->
      <div id="sidebar-bottom">
        <div id="history-section">
          <h2>Recently Played</h2>
          <div id="history-list"></div>
        </div>

        <div id="album-section">
          <h2>About the Album</h2>
          <div class="info-grid">
            <div class="info-card">
              <span class="label">Genre</span>
              <span class="value" id="info-genre">—</span>
            </div>
            <div class="info-card">
              <span class="label">Year</span>
              <span class="value" id="info-year">—</span>
            </div>
            <div class="info-card">
              <span class="label">Tracks</span>
              <span class="value" id="info-tracks">—</span>
            </div>
            <div class="info-card">
              <span class="label">Album</span>
              <span class="value" id="info-album">—</span>
            </div>
          </div>
        </div>
      </div>

    </aside>

    <!-- Draggable resize handle -->
    <div id="resize-handle"></div>

    <!-- Right: lyrics -->
    <main id="lyrics-panel">

      <!-- Rate-limit banner -->
      <div id="rate-limit-banner"></div>

      <!-- Floating controls -->
      <div id="controls">
        <button class="ctrl-btn" id="btn-fontsize" title="Change font size">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <text x="2" y="18" font-size="18" font-weight="bold" stroke="none" fill="currentColor">A</text>
          </svg>
          <span id="fontsize-label">M</span>
        </button>
        <button class="ctrl-btn" id="btn-recognize" title="Recognize music now">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-9-9"/>
            <polyline points="21 3 21 9 15 9"/>
          </svg>
          Recognize now
        </button>
        <button class="ctrl-btn" id="btn-search" title="Search for a song">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </div>

      <div id="lyrics-scroll">
        <div id="lyrics-inner"></div>
      </div>
    </main>
  </div>

  <!-- Search / override modal -->
  <div id="search-overlay">
    <div id="search-modal">
      <h3>Search for a song</h3>
      <div class="search-field">
        <label for="input-artist">Artist</label>
        <input id="input-artist" type="text" placeholder="e.g. The Beatles" autocomplete="off" />
      </div>
      <div class="search-field">
        <label for="input-title">Title</label>
        <input id="input-title" type="text" placeholder="e.g. Come Together" autocomplete="off" />
      </div>
      <div id="search-actions">
        <button class="search-btn" id="btn-search-cancel">Cancel</button>
        <button class="search-btn" id="btn-search-submit">Load lyrics</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Element refs ── */
    const bgEl        = document.getElementById('bg');
    const statusEl    = document.getElementById('status');
    const appEl       = document.getElementById('app');
    const artImg      = document.getElementById('album-art');
    const titleEl     = document.getElementById('song-title');
    const artistEl    = document.getElementById('artist-name');
    const albumLineEl = document.getElementById('album-line');
    const scrollEl    = document.getElementById('lyrics-scroll');
    const innerEl     = document.getElementById('lyrics-inner');
    const genreEl     = document.getElementById('info-genre');
    const yearEl      = document.getElementById('info-year');
    const tracksEl    = document.getElementById('info-tracks');
    const albumEl     = document.getElementById('info-album');
    const sidebar     = document.getElementById('sidebar');
    const handle      = document.getElementById('resize-handle');

    /* ── Sidebar resize ── */
    const SIDEBAR_MIN  = 180;
    const SIDEBAR_MAX  = 520;
    const STORAGE_KEY  = 'live-lyrics-sidebar-w';

    // Restore persisted width
    const savedW = parseInt(localStorage.getItem(STORAGE_KEY), 10);
    if (savedW >= SIDEBAR_MIN && savedW <= SIDEBAR_MAX) {
      sidebar.style.width = savedW + 'px';
    }

    handle.addEventListener('mousedown', e => {
      const startX = e.clientX;
      const startW = sidebar.offsetWidth;

      handle.classList.add('dragging');
      document.body.style.cursor    = 'col-resize';
      document.body.style.userSelect = 'none';

      function onMove(e) {
        const w = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, startW + (e.clientX - startX)));
        sidebar.style.width = w + 'px';
      }

      function onUp() {
        handle.classList.remove('dragging');
        document.body.style.cursor    = '';
        document.body.style.userSelect = '';
        localStorage.setItem(STORAGE_KEY, sidebar.offsetWidth);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
      e.preventDefault();
    });

    /* ── Smooth scroll: center active line ── */
    let lineEls = [];
    let currentLyricsJson = '';
    let currentLineIndex  = -1;
    let scrollRaf = null;

    function scrollToLine(idx) {
      const el = lineEls[idx];
      if (!el) return;
      const target = el.offsetTop - scrollEl.clientHeight / 2 + el.clientHeight / 2;
      smoothScrollTo(scrollEl, target, 600);
    }

    function smoothScrollTo(el, target, duration) {
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      const start     = el.scrollTop;
      const diff      = target - start;
      if (Math.abs(diff) < 2) return;
      const startTime = performance.now();

      function step(now) {
        const elapsed = now - startTime;
        const t    = Math.min(elapsed / duration, 1);
        const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;
        el.scrollTop = start + diff * ease;
        if (t < 1) scrollRaf = requestAnimationFrame(step);
      }
      scrollRaf = requestAnimationFrame(step);
    }

    /* ── Lyrics rendering ── */
    let currentLyrics = [];

    function renderLyrics(lyrics) {
      currentLyrics = lyrics;
      innerEl.innerHTML = '';
      lineEls = lyrics.map((l, i) => {
        const p = document.createElement('p');
        p.className   = 'lyric-line';
        p.textContent = l.text || '';
        p.dataset.timeS = l.time_s;
        p.dataset.idx   = i;
        innerEl.appendChild(p);
        return p;
      });
    }

    function updateActive(idx) {
      lineEls.forEach((el, i) => {
        el.classList.remove('active', 'near-1', 'near-2');
        const dist = i - idx;
        if      (dist === 0)               el.classList.add('active');
        else if (dist === 1 || dist === -1) el.classList.add('near-1');
        else if (dist === 2 || dist === -2) el.classList.add('near-2');
      });
      scrollToLine(idx);
    }

    /* ── Click-to-seek ── */
    innerEl.addEventListener('click', async e => {
      const line = e.target.closest('.lyric-line');
      if (!line || !line.dataset.timeS) return;

      const time_s = parseFloat(line.dataset.timeS);
      const idx    = parseInt(line.dataset.idx, 10);

      // Optimistic update: jump the display immediately
      currentLineIndex = idx;
      updateActive(idx);
      line.classList.add('seeking');
      line.addEventListener('animationend', () => line.classList.remove('seeking'), { once: true });

      // Tell backend to reset the tracker to this position
      try {
        await fetch('/seek', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ time_s }),
        });
      } catch (_) {}
    });

    /* ── Album artwork ── */
    let currentArtwork = '';

    function updateArtwork(url) {
      if (!url) {
        artImg.classList.add('loading');
        bgEl.style.backgroundImage = '';
        bgEl.classList.remove('visible');
        return;
      }
      artImg.classList.add('loading');
      const img  = new Image();
      img.onload = () => {
        artImg.src = url;
        artImg.classList.remove('loading');
        bgEl.style.backgroundImage = `url('${url}')`;
        bgEl.classList.add('visible');
      };
      img.src = url;
    }

    /* ── Facts rotation ── */
    const factsSectionEl = document.getElementById('facts-section');
    const factTextEl     = document.getElementById('fact-text');
    let currentFactsJson = '';
    let facts            = [];
    let factIdx          = 0;
    let factTimer        = null;

    function showFact(idx) {
      // Exit animation — swap content when it finishes, then enter
      factTextEl.classList.remove('fact-entering');
      factTextEl.classList.add('fact-exiting');
      factTextEl.addEventListener('animationend', () => {
        factTextEl.classList.remove('fact-exiting');
        factTextEl.textContent = facts[idx] || '';
        // Trigger reflow so the enter animation starts fresh
        void factTextEl.offsetWidth;
        factTextEl.classList.add('fact-entering');
        factTextEl.addEventListener('animationend', () => {
          factTextEl.classList.remove('fact-entering');
        }, { once: true });
      }, { once: true });
    }

    function startFactRotation(newFacts, intervalMs) {
      if (factTimer) { clearInterval(factTimer); factTimer = null; }
      facts   = newFacts;
      factIdx = 0;
      if (!facts.length) { factsSectionEl.style.display = 'none'; return; }
      // Show first fact with enter animation
      factTextEl.classList.remove('fact-exiting', 'fact-entering');
      factTextEl.textContent = facts[0];
      void factTextEl.offsetWidth;
      factTextEl.classList.add('fact-entering');
      factTextEl.addEventListener('animationend', () => {
        factTextEl.classList.remove('fact-entering');
      }, { once: true });
      factsSectionEl.style.display = 'block';
      if (facts.length > 1) {
        factTimer = setInterval(() => {
          factIdx = (factIdx + 1) % facts.length;
          showFact(factIdx);
        }, intervalMs);
      }
    }

    /* ── Rate-limit banner ── */
    const rateLimitBannerEl = document.getElementById('rate-limit-banner');

    function updateRateLimitBanner(remainingS) {
      if (remainingS > 0) {
        rateLimitBannerEl.textContent = `AudD rate limited — retrying in ${remainingS}s`;
        rateLimitBannerEl.classList.add('visible');
      } else {
        rateLimitBannerEl.classList.remove('visible');
      }
    }

    /* ── WebSocket state ── */
    let currentSong = '';

    function applyState(msg) {
      const { lineIndex, song, artist, album, year, genre, trackCount, artworkUrl, lyrics, facts: newFacts, factRotationS, history, rateLimitedRemainingS } = msg;

      updateRateLimitBanner(rateLimitedRemainingS || 0);
      renderHistory(history || []);

      const factsJson = JSON.stringify(newFacts || []);
      if (factsJson !== currentFactsJson) {
        currentFactsJson = factsJson;
        startFactRotation(newFacts || [], (factRotationS || 9) * 1000);
      }

      if (song && song !== currentSong) {
        currentSong = song;
        statusEl.classList.add('hidden');
        appEl.classList.add('visible');

        titleEl.textContent  = song   || '—';
        artistEl.textContent = artist || '—';

        const parts = [album, year].filter(Boolean);
        albumLineEl.textContent = parts.join(' · ');

        genreEl.textContent  = genre      || '—';
        yearEl.textContent   = year       || '—';
        tracksEl.textContent = trackCount ? `${trackCount} tracks` : '—';
        albumEl.textContent  = album      || '—';

        if (artworkUrl !== currentArtwork) {
          currentArtwork = artworkUrl;
          updateArtwork(artworkUrl);
        }
      }

      const lyricsJson = JSON.stringify(lyrics);
      if (lyricsJson !== currentLyricsJson) {
        currentLyricsJson = lyricsJson;
        currentLineIndex  = -1;
        renderLyrics(lyrics);
        scrollEl.scrollTop = 0;
      }

      if (lineIndex !== currentLineIndex && lineIndex >= 0 && lineEls.length > 0) {
        currentLineIndex = lineIndex;
        updateActive(lineIndex);
      }
    }

    /* ── Font size button ── */
    const FONT_SIZES = [
      { label: 'S', value: '1.15rem' },
      { label: 'M', value: '1.6rem'  },
      { label: 'L', value: '2.1rem'  },
    ];
    const FONT_KEY = 'live-lyrics-font-size';

    let fontIdx = parseInt(localStorage.getItem(FONT_KEY), 10) || 1;

    function applyFontSize(idx) {
      const size = FONT_SIZES[idx];
      document.documentElement.style.setProperty('--lyric-size', size.value);
      document.getElementById('fontsize-label').textContent = size.label;
    }

    applyFontSize(fontIdx);

    document.getElementById('btn-fontsize').addEventListener('click', () => {
      fontIdx = (fontIdx + 1) % FONT_SIZES.length;
      localStorage.setItem(FONT_KEY, fontIdx);
      applyFontSize(fontIdx);
    });

    /* ── Recognize now button ── */
    document.getElementById('btn-recognize').addEventListener('click', async () => {
      const btn = document.getElementById('btn-recognize');
      btn.classList.add('loading');
      try {
        await fetch('/recognize-now', { method: 'POST' });
      } catch (_) {}
      // Keep loading state for 3s so user has visual feedback that it's working
      setTimeout(() => btn.classList.remove('loading'), 3000);
    });

    /* ── Search / override modal ── */
    const searchOverlayEl = document.getElementById('search-overlay');
    const inputArtist     = document.getElementById('input-artist');
    const inputTitle      = document.getElementById('input-title');

    function openSearch() {
      inputArtist.value = '';
      inputTitle.value  = '';
      searchOverlayEl.classList.add('visible');
      inputArtist.focus();
    }

    function closeSearch() {
      searchOverlayEl.classList.remove('visible');
    }

    document.getElementById('btn-search').addEventListener('click', openSearch);
    document.getElementById('btn-search-cancel').addEventListener('click', closeSearch);
    searchOverlayEl.addEventListener('click', e => { if (e.target === searchOverlayEl) closeSearch(); });

    document.getElementById('btn-search-submit').addEventListener('click', async () => {
      const artist = inputArtist.value.trim();
      const title  = inputTitle.value.trim();
      if (!artist || !title) return;
      closeSearch();
      try {
        await fetch('/api/override', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ artist, title }),
        });
      } catch (_) {}
    });

    // Submit on Enter in either field
    [inputArtist, inputTitle].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-search-submit').click();
        if (e.key === 'Escape') closeSearch();
      });
    });

    /* ── History ── */
    const historySectionEl = document.getElementById('history-section');
    const historyListEl    = document.getElementById('history-list');
    let currentHistoryJson = '';

    function timeAgo(isoStr) {
      const diffS = (Date.now() - new Date(isoStr)) / 1000;
      if (diffS < 60)    return 'just now';
      if (diffS < 3600)  return `${Math.floor(diffS / 60)}m ago`;
      if (diffS < 86400) return `${Math.floor(diffS / 3600)}h ago`;
      return `${Math.floor(diffS / 86400)}d ago`;
    }

    function renderHistory(history) {
      const json = JSON.stringify(history);
      if (json === currentHistoryJson) return;
      currentHistoryJson = json;

      if (!history || history.length === 0) {
        historySectionEl.classList.remove('visible');
        return;
      }

      historySectionEl.classList.add('visible');
      historyListEl.innerHTML = '';

      history.forEach(entry => {
        const row = document.createElement('div');
        row.className = 'history-entry';

        if (entry.artworkUrl) {
          const img = document.createElement('img');
          img.className = 'history-thumb';
          img.src = entry.artworkUrl;
          img.alt = '';
          img.onerror = () => img.replaceWith(makePlaceholder());
          row.appendChild(img);
        } else {
          row.appendChild(makePlaceholder());
        }

        const meta = document.createElement('div');
        meta.className = 'history-meta';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'history-title';
        titleDiv.textContent = entry.title || '—';

        const subDiv = document.createElement('div');
        subDiv.className = 'history-sub';
        subDiv.textContent = entry.artist || '';

        meta.appendChild(titleDiv);
        meta.appendChild(subDiv);
        row.appendChild(meta);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'history-time';
        timeDiv.textContent = timeAgo(entry.playedAt);
        row.appendChild(timeDiv);

        historyListEl.appendChild(row);
      });
    }

    // Refresh timestamps every 30s so "just now" ages correctly
    setInterval(() => {
      historyListEl.querySelectorAll('.history-time').forEach((el, i) => {
        const entry = JSON.parse(currentHistoryJson)[i];
        if (entry) el.textContent = timeAgo(entry.playedAt);
      });
    }, 30_000);

    function makePlaceholder() {
      const div = document.createElement('div');
      div.className = 'history-thumb-placeholder';
      div.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
      return div;
    }

    /* ── WebSocket with auto-reconnect ── */
    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onmessage = ev => { try { applyState(JSON.parse(ev.data)); } catch (_) {} };
      ws.onclose   = ()  => setTimeout(connect, 2000);
      ws.onerror   = ()  => ws.close();
    }

    connect();
  </script>
</body>
</html>
